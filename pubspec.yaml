name: nimble_story_designer
description: >-
  A fully-featured Flutter package for 24-hour Instagram-style disappearing
  stories. Includes a story viewer with gestures, a full story creator/canvas
  (text, image, paint, overlays, polls, Q&A, countdowns, stickers, emoji),
  animated story row, emoji reactions, and more. Bring your own backend.
version: 1.0.1
homepage: https://github.com/AtulPurohit/Nimble_Story_Designer
repository: https://github.com/AtulPurohit/Nimble_Story_Designer
issue_tracker: https://github.com/AtulPurohit/Nimble_Story_Designer/issues
documentation: https://github.com/AtulPurohit/Nimble_Story_Designer#readme

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.0
  image_picker: ^1.1.0
  image: ^4.0.0
  path_provider: ^2.1.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0
  font_awesome_flutter: ^10.7.0
  share_plus: ^10.0.0
  gal: ^2.3.0
  provider: ^6.1.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
